# Configuración Virtual Host para VetCare Pro en XAMPP
# 
# INSTRUCCIONES:
# 1. Copia este archivo a: C:\xampp\apache\conf\extra\httpd-vhosts.conf
#    (o añade su contenido al final del archivo existente)
#
# 2. Edita C:\xampp\apache\conf\httpd.conf
#    Busca y DESCOMENTA (quita el # al inicio):
#    #Include conf/extra/httpd-vhosts.conf
#
# 3. Reinicia Apache desde XAMPP Control Panel
#
# 4. Accede a: http://vetcare.local

# Configuración del proxy inverso para Node.js
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

<VirtualHost *:80>
    ServerName vetcare.local
    ServerAlias www.vetcare.local
    DocumentRoot "C:/xampp/htdocs/vetcare-server/client/dist"
    
    # Proxy para la API de Node.js
    ProxyPass /api http://localhost:3000/api
    ProxyPassReverse /api http://localhost:3000/api
    
    # Proxy para autenticación
    ProxyPass /api/auth http://localhost:3000/api/auth
    ProxyPassReverse /api/auth http://localhost:3000/api/auth
    
    <Directory "C:/xampp/htdocs/vetcare-server/client/dist">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog "logs/vetcare-error.log"
    CustomLog "logs/vetcare-access.log" common
</VirtualHost>

